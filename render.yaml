services:
  - type: web
    name: tottal-analise-api
    env: docker
    plan: free
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: PAGBANK_TOKEN
        sync: false
      - key: API_BASE_URL
        value: https://tottal-analise-api.onrender.com
